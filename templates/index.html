{% extends "base.html" %}
{% block title %}Index{% endblock %}
{% block content %}
<h1>All Content</h1><hr>
{% for section_name, items in sections %}
<h2>{{ section_name }}</h2>
<ul>
{% for item in items %}
<li><a href="/{{ item.section }}/{{ item.safe_name }}">{{ item.name }}</a></li>
{% endfor %}
</ul>
<hr>
{% endfor %}
{% endblock %}
